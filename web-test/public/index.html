<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CCIT WebVPN 登录协议测试</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <section class="intro">
      <span class="eyebrow">LOCAL PROTOCOL PROBE</span>
      <h1>WebVPN 登录协议测试</h1>
      <p>先验证网页流程，再决定是否移植到 App。所有凭据只从本机测试服务转发至学校 WebVPN，不写入磁盘、不进入诊断日志。</p>
      <div class="badges"><span>本机 127.0.0.1</span><span>日志自动脱敏</span><span>RSA-2048 / PKCS#1 v1.5</span></div>
    </section>

    <section class="card">
      <div class="card-title"><div><small>步骤 1</small><h2>读取官方配置与验证码</h2></div><button id="refresh" class="secondary" type="button">刷新验证码</button></div>
      <div id="bootstrap-state" class="state waiting">等待初始化</div>
      <div class="captcha-row"><div class="captcha-frame"><img id="captcha" alt="图形验证码"></div><p>看不清可刷新。验证码由你手动识别，本工具不会自动识别或绕过。</p></div>
    </section>

    <form id="login-form" class="card" autocomplete="off">
      <div class="card-title"><div><small>步骤 2</small><h2>发送与 HAR 同形的请求</h2></div></div>
      <label>账号<input id="username" name="username" autocomplete="username" required placeholder="学号或工号"></label>
      <label>密码<input id="password" name="password" type="password" autocomplete="current-password" required placeholder="只在本次请求中使用"></label>
      <label>验证码<input id="code" name="code" inputmode="text" maxlength="8" required placeholder="图中字符"></label>
      <button id="submit" class="primary" type="submit">开始协议测试</button>
      <p class="notice">点击后会把账号、RSA 加密后的密码、captchaId 和验证码发送到 <strong>webvpn.ccit.edu.cn</strong>。</p>
    </form>

    <section class="card">
      <div class="card-title"><div><small>步骤 3</small><h2>脱敏诊断结果</h2></div><button id="copy-log" class="secondary" type="button">复制日志</button></div>
      <div id="result" class="state waiting">尚未测试</div>
      <pre id="diagnostics">[]</pre>
    </section>
  </main>
  <script type="module" src="app.js"></script>
</body>
</html>
